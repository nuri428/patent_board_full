name: Open Patent CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./back_end

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Lint (targeted quality gate)
      run: |
        uv run flake8 \
          app/api/v1/endpoints/mcp.py \
          app/core/config.py \
          app/schemas/mcp.py \
          app/langgraph/chatbot/auth.py \
          app/crud/patent_db.py \
          app/langgraph/chatbot/agents/patent_agent.py \
          app/langgraph/chatbot/agents/context_engineering.py \
          tests/test_feature_route_registration.py \
          tests/test_feature_api_contracts.py \
          ../shared/database/__init__.py \
          --extend-ignore=E501,W291,W293,E203

    - name: Typecheck (targeted quality gate)
      run: |
        python -m py_compile \
          app/core/config.py \
          app/schemas/mcp.py \
          app/langgraph/chatbot/auth.py \
          app/api/v1/endpoints/mcp.py \
          app/crud/patent_db.py \
          app/langgraph/chatbot/agents/context_engineering.py \
          app/langgraph/chatbot/agents/patent_agent.py \
          tests/test_feature_route_registration.py \
          tests/test_feature_api_contracts.py \
          ../shared/database/__init__.py

    - name: Run Tests
      run: PYTHONPATH=${{ github.workspace }} uv run pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./front_end

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './front_end/package.json'

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint

    - name: Build
      run: npm run build
