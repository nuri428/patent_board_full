<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Patent Board</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/static/css/modern-design.css" rel="stylesheet">
</head>
<body>
    <!-- Login Container -->
    <div class="login-container">
        <div class="login-background">
            <div class="floating-shapes">
                <div class="shape shape-1"></div>
                <div class="shape shape-2"></div>
                <div class="shape shape-3"></div>
            </div>
        </div>
        
        <div class="login-form-container">
            <!-- Logo Section -->
            <div class="text-center mb-4 fade-in">
                <div class="login-logo">
                    <i class="fas fa-lightbulb"></i>
                </div>
                <h1 class="login-title">Welcome Back</h1>
                <p class="login-subtitle">Sign in to access your patent research dashboard</p>
            </div>

            <!-- Login Form -->
            <div class="login-card slide-up">
                <form id="login-form">
                    <div class="mb-4">
                        <label for="email" class="form-label">
                            <i class="fas fa-envelope me-2"></i>Email Address
                        </label>
                        <div class="input-group-modern">
                            <input type="email" 
                                   class="form-control-modern" 
                                   id="email" 
                                   name="email" 
                                   placeholder="Enter your email"
                                   required>
                            <div class="input-icon">
                                <i class="fas fa-envelope"></i>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock me-2"></i>Password
                        </label>
                        <div class="input-group-modern">
                            <input type="password" 
                                   class="form-control-modern" 
                                   id="password" 
                                   name="password" 
                                   placeholder="Enter your password"
                                   required>
                            <div class="input-icon">
                                <i class="fas fa-lock"></i>
                            </div>
                            <button type="button" class="password-toggle" onclick="togglePassword()">
                                <i class="fas fa-eye" id="password-icon"></i>
                            </button>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="remember-me">
                            <label class="form-check-label" for="remember-me">
                                Remember me
                            </label>
                        </div>
                        <a href="#" class="text-primary text-decoration-none">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn-login w-100" id="login-button">
                        <i class="fas fa-sign-in-alt me-2"></i>
                        <span id="login-text">Sign In</span>
                        <div class="login-spinner d-none">
                            <i class="fas fa-spinner fa-spin"></i>
                        </div>
                    </button>
                </form>

                <!-- Divider -->
                <div class="login-divider">
                    <span>or</span>
                </div>

                <!-- Social Login Options -->
                <div class="social-login">
                    <button type="button" class="btn-social btn-google">
                        <i class="fab fa-google me-2"></i>Continue with Google
                    </button>
                    <button type="button" class="btn-social btn-microsoft">
                        <i class="fab fa-microsoft me-2"></i>Continue with Microsoft
                    </button>
                </div>

                <!-- Register Link -->
                <div class="text-center mt-4">
                    <p class="text-muted">
                        Don't have an account? 
                        <a href="/register" class="text-primary text-decoration-none fw-bold">
                            Sign up for free
                        </a>
                    </p>
                </div>
            </div>

            <!-- Footer -->
            <div class="login-footer">
                <p class="text-muted small">
                    <i class="fas fa-shield-alt me-2"></i>
                    Secure login powered by enterprise-grade encryption
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/api-client.js"></script>
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const passwordIcon = document.getElementById('password-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordIcon.classList.remove('fa-eye');
                passwordIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                passwordIcon.classList.remove('fa-eye-slash');
                passwordIcon.classList.add('fa-eye');
            }
        }
        class LoginManager {
            constructor() {
                this.form = document.getElementById('login-form');
                this.init();
            }

            init() {
                this.form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.login();
                });

                // Check if already authenticated
                if (authManager.isAuthenticated()) {
                    this.redirectAfterLogin();
                }

                // Handle redirect parameter
                const urlParams = new URLSearchParams(window.location.search);
                const redirect = urlParams.get('redirect');
                if (redirect) {
                    this.redirectUrl = redirect;
                }
            }

            async login() {
                const formData = new FormData(this.form);
                const loginData = {
                    email: formData.get('email'),
                    password: formData.get('password')
                };

                try {
                    // Show loading state
                    const submitBtn = this.form.querySelector('button[type="submit"]');
                    const originalText = submitBtn.innerHTML;
                    submitBtn.disabled = true;
                    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

                    const response = await apiClient.post(ApiEndpoints.auth.login, loginData);

                    if (!response) {
                        return;
                    }

                    const authData = await response.json();

                    // Store authentication data
                    authManager.setAuthData(
                        authData.access_token,
                        authData.user,
                        authData.refresh_token
                    );

                    // Show success message
                    authManager.showAlert('Login successful! Redirecting...', 'success');

                    // Redirect after successful login
                    setTimeout(() => {
                        this.redirectAfterLogin();
                    }, 1000);

                } catch (error) {
                    console.error('Login error:', error);
                    authManager.showAlert('Login failed. Please check your credentials.', 'danger');
                } finally {
                    // Reset button state
                    const submitBtn = this.form.querySelector('button[type="submit"]');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                }
            }

            redirectAfterLogin() {
                const redirectUrl = this.redirectUrl || '/dashboard';
                window.location.href = redirectUrl;
            }
        }

        // Initialize login manager
        const loginManager = new LoginManager();
    </script>
</body>
</html>
