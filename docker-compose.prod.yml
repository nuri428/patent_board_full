version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: patent-board-backend-prod
    restart: always
    ports:
      - "${PROD_BACKEND_PORT:-8000}:${BACKEND_PORT:-8001}"
    env_file:
      - .env
    environment:
      - MARIADB_URL=${MARIADB_URL}
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USER=${NEO4J_USER}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - ENVIRONMENT=production
      - DEBUG=false
      - HEALTHCHECK_URL=http://localhost:8001/health
      - MCP_SERVER_URL=http://patent-board-mcp-prod:8080
      - OPENSEARCH_HOST=${OPENSEARCH_HOST}
      - OPENSEARCH_PORT=${OPENSEARCH_PORT}
    networks:
      - patent-board-network-prod
    depends_on:
      - redis
      - mcp
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  mcp:
    build:
      context: .
      dockerfile: docker/mcp/Dockerfile
    container_name: patent-board-mcp-prod
    restart: always
    environment:
      - MARIADB_URL=${MARIADB_URL}
      - PATENTDB_URL=${PATENTDB_URL}
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USER=${NEO4J_USER}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENSEARCH_HOST=${OPENSEARCH_HOST}
      - OPENSEARCH_PORT=${OPENSEARCH_PORT}
      - OPENSEARCH_USER=${OPENSEARCH_USER}
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD}
    networks:
      - patent-board-network-prod
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        - VITE_API_URL=${PROD_URL}/api/v1
    container_name: patent-board-frontend-prod
    restart: always
    ports:
      - "${PROD_FRONTEND_PORT:-80}:${FRONTEND_PORT:-3000}"
    environment:
      - VITE_API_URL=${PROD_URL}/api/v1
    networks:
      - patent-board-network-prod
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    container_name: patent-board-redis-prod
    restart: always
    networks:
      - patent-board-network-prod
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  patent-board-network-prod:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.201.0/24
