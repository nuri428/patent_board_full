version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: patent-board-backend-prod
    restart: always
    ports:
      - "${PROD_BACKEND_PORT:-8000}:${BACKEND_PORT:-8001}"
    env_file:
      - .env
    environment:
      - MARIADB_URL=${MARIADB_URL}
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USER=${NEO4J_USER}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - ENVIRONMENT=production
      - DEBUG=false
      - LOG_LEVEL=INFO
    networks:
      - patent-board-network-prod
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: patent-board-frontend-prod
    restart: always
    ports:
      - "${PROD_FRONTEND_PORT:-80}:${FRONTEND_PORT:-3000}"
    environment:
      - VITE_API_URL=http://localhost:${PROD_BACKEND_PORT:-8000}/api/v1
    networks:
      - patent-board-network-prod
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    container_name: patent-board-redis-prod
    restart: always
    networks:
      - patent-board-network-prod
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  patent-board-network-prod:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.201.0/24
