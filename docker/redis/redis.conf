# Redis Configuration for Docker
# Basic Redis configuration for Patent Board

# Network settings
bind 0.0.0.0 6379
protected-mode no
port 6379
tcp-backlog 511

# Persistence
appendonly yes
appendfsync everysec
save 900 1
stop-writes-on-bgsave yes

# Memory management
maxmemory 512mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
logfile ""

# Security
requirepass ${REDIS_PASSWORD}
rename-command "CONFIG"

# Data persistence
rdbcompression yes
rdbchecksum yes

# Client settings
timeout 0
tcp-keepalive 300
tcp-backlog 511

# Performance tuning
hz 10
dynamic-hz yes
aof-rewrite-incremental-fsync yes
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb